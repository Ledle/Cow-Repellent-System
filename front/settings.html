<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Настройки системы</title>
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e2f; --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0; --accent-color: #00bcd4;
            --success-color: #4caf50; --error-color: #f44336;
            --border-color: #33334d; --input-bg: #2a2a3e;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-primary); margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .top-bar h1 { margin: 0; color: var(--accent-color); font-size: 1.4rem; }
        .top-bar a { color: var(--text-secondary); text-decoration: none; }
        .top-bar a:hover { color: var(--accent-color); }

        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: var(--accent-color); color: #000; }
        .btn-success { background: var(--success-color); color: #fff; }

        .settings-section {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 20px; margin-bottom: 20px;
        }
        .settings-section h2 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--accent-color); }

        .form-row { display: flex; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-secondary); }
        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select {
            width: 100%; padding: 8px 12px; background: var(--input-bg);
            border: 1px solid var(--border-color); border-radius: 4px;
            color: var(--text-primary); font-size: 0.95rem; box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: var(--accent-color);
        }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-color); }
        .checkbox-group label { margin: 0; cursor: pointer; font-size: 0.9rem; color: var(--text-primary); }

        .form-group select option { background: var(--input-bg); color: var(--text-primary); }

        .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }

        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
            border-radius: 6px; color: #fff; font-size: 0.9rem; z-index: 2000;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: var(--success-color); }
        .toast.error { background: var(--error-color); }
    </style>
</head>
<body>
    <div class="top-bar">
        <div>
            <a href="/">← На главную</a>
            <h1>Настройки системы</h1>
        </div>
    </div>

    <div class="settings-section">
        <h2>Модель</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Имя модели</label>
                <input type="text" id="model-name" placeholder="yolo26s">
            </div>
            <div class="form-group">
                <label>Задержка теста (сек)</label>
                <input type="number" id="model-test-delay" min="0" max="60" value="1">
            </div>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="model-fuse">
            <label for="model-fuse">Fuse (ускорение инференса)</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="model-test">
            <label for="model-test">Тестовый режим (мок-детекция)</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="model-verbose">
            <label for="model-verbose">Verbose (подробный вывод)</label>
        </div>
    </div>

    <div class="settings-section">
        <h2>Приложение</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="app-name" placeholder="Cow Reppelent System">
            </div>
            <div class="form-group">
                <label>Уровень логирования</label>
                <select id="app-logging-level">
                    <option value="debug">debug</option>
                    <option value="info">info</option>
                    <option value="warning" selected>warning</option>
                    <option value="error">error</option>
                </select>
            </div>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="app-enable-web-ui">
            <label for="app-enable-web-ui">Включить Web UI</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="app-enable-config-api">
            <label for="app-enable-config-api">Включить Config API</label>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-success" onclick="saveSettings()">Сохранить</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api';

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        async function loadSettings() {
            try {
                const resp = await fetch(`${API_BASE_URL}/settings`);
                if (!resp.ok) throw new Error('Ошибка загрузки');
                const data = await resp.json();

                const m = data.model || {};
                document.getElementById('model-name').value = m.name || '';
                document.getElementById('model-test-delay').value = m.test_delay ?? m['test-delay'] ?? 1;
                document.getElementById('model-fuse').checked = m.fuse !== false;
                document.getElementById('model-test').checked = m.test === true;
                document.getElementById('model-verbose').checked = m.verbose === true;

                const a = data.application || {};
                document.getElementById('app-name').value = a.name || '';
                document.getElementById('app-logging-level').value = a.logging_level || a['logging-level'] || 'warning';
                document.getElementById('app-enable-web-ui').checked = a.enable_web_ui || a['enable-web-ui'] === true;
                document.getElementById('app-enable-config-api').checked = a.enable_config_api || a['enable-config-api'] === true;
            } catch (e) {
                showToast('Ошибка загрузки настроек: ' + e.message, 'error');
            }
        }

        async function saveSettings() {
            const payload = {
                model: {
                    name: document.getElementById('model-name').value.trim(),
                    fuse: document.getElementById('model-fuse').checked,
                    test: document.getElementById('model-test').checked,
                    'test-delay': parseInt(document.getElementById('model-test-delay').value) || 1,
                    verbose: document.getElementById('model-verbose').checked
                },
                application: {
                    name: document.getElementById('app-name').value.trim(),
                    'logging-level': document.getElementById('app-logging-level').value,
                    'enable-web-ui': document.getElementById('app-enable-web-ui').checked,
                    'enable-config-api': document.getElementById('app-enable-config-api').checked
                }
            };

            try {
                const resp = await fetch(`${API_BASE_URL}/settings`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Ошибка сохранения');
                }
                showToast('Настройки сохранены');
            } catch (e) {
                showToast('Ошибка: ' + e.message, 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', loadSettings);
    </script>
</body>
</html>
