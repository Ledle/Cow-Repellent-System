<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Устройства системы</title>
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e2f; --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0; --accent-color: #00bcd4;
            --success-color: #4caf50; --error-color: #f44336;
            --border-color: #33334d; --input-bg: #2a2a3e;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-primary); margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .top-bar h1 { margin: 0; color: var(--accent-color); font-size: 1.4rem; }
        .top-bar a { color: var(--text-secondary); text-decoration: none; }
        .top-bar a:hover { color: var(--accent-color); }
        
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
        .btn-primary { background: var(--accent-color); color: #000; }
        .btn-success { background: var(--success-color); color: #fff; }
        .btn-danger { background: var(--error-color); color: #fff; }
        .btn-secondary { background: #555; color: #fff; }
        .btn-small { padding: 4px 8px; font-size: 0.8rem; }

        .devices-table {
            width: 100%; border-collapse: collapse; background: var(--card-bg);
            border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color);
        }
        .devices-table th, .devices-table td {
            padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color);
        }
        .devices-table th { background: #252538; color: var(--text-secondary); font-weight: 600; }
        
        .status-badge {
            padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase;
        }
        .status-on { background: rgba(76, 175, 80, 0.2); color: var(--success-color); }
        .status-off { background: rgba(244, 67, 54, 0.2); color: var(--error-color); }

        .modal-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; width: 90%; max-width: 450px; }
        .modal h2 { margin-top: 0; color: var(--accent-color); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-secondary); }
        .form-group input[type="text"], .form-group input[type="url"] {
            width: 100%; padding: 8px; background: var(--input-bg); border: 1px solid var(--border-color);
            border-radius: 4px; color: var(--text-primary); box-sizing: border-box;
        }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div>
            <a href="/">← На главную</a>
            <h1>Управление устройствами</h1>
        </div>
        <button class="btn btn-primary" onclick="openModal()">+ Добавить устройство</button>
    </div>

    <table class="devices-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>URL</th>
                <th>Состояние</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="devices-list">
            <tr><td colspan="5" style="text-align:center; padding: 30px;">Загрузка...</td></tr>
        </tbody>
    </table>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modal-title">Добавить устройство</h2>
            <form id="device-form" onsubmit="saveDevice(event)">
                <input type="hidden" id="form-mode" value="create">
                <input type="hidden" id="form-original-id" value="">
                
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" id="form-name" required placeholder="Отпугиватель перимetра">
                </div>
                <div class="form-group">
                    <label>URL для активации *</label>
                    <input type="url" id="form-url" required placeholder="http://192.168.1.10/api/trigger">
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="form-enable" checked>
                        <label for="form-enable" style="margin:0; cursor:pointer;">Активно (enable)</label>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                    <button type="button" class="btn btn-danger" id="btn-delete" style="display:none; margin-right:auto;" onclick="deleteDevice()">Удалить</button>
                    <button type="submit" class="btn btn-success">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000/api';
        let devices = [];

        async function loadDevices() {
            try {
                const resp = await fetch(`${API}/devices`);
                if (!resp.ok) throw new Error('Ошибка загрузки');
                devices = await resp.json();
                renderTable();
            } catch (e) {
                document.getElementById('devices-list').innerHTML = `<tr><td colspan="5" style="text-align:center; color: var(--error-color);">Ошибка: ${e.message}</td></tr>`;
            }
        }

        function renderTable() {
            const tbody = document.getElementById('devices-list');
            if (devices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 30px;">Нет устройств. Добавьте первое.</td></tr>';
                return;
            }
            tbody.innerHTML = devices.map(d => {
                // Сервер может вернуть id как число или строку
                const idDisplay = d.id !== undefined ? d.id : 'N/A';
                const statusClass = d.enable ? 'status-on' : 'status-off';
                const statusText = d.enable ? 'Вкл' : 'Выкл';
                
                return `
                <tr>
                    <td style="font-family: monospace;">${idDisplay}</td>
                    <td>${d.name}</td>
                    <td style="font-family: monospace; font-size: 0.85rem; color: var(--text-secondary);">${d.url}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <button class="btn btn-secondary btn-small" onclick="editDevice('${d.id}')">✎</button>
                        <button class="btn btn-danger btn-small" onclick="promptDelete('${d.id}')">🗑</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.getElementById('form-mode').value = 'create';
            document.getElementById('form-original-id').value = '';
            document.getElementById('form-name').value = '';
            document.getElementById('form-url').value = '';
            document.getElementById('form-enable').checked = true;
            document.getElementById('btn-delete').style.display = 'none';
            document.getElementById('modal-title').textContent = 'Добавить устройство';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function editDevice(id) {
            // Находим устройство по id (учитываем, что id может быть числом или строкой)
            const d = devices.find(x => String(x.id) === String(id));
            if (!d) return;
            
            document.getElementById('modal').classList.add('active');
            document.getElementById('form-mode').value = 'edit';
            document.getElementById('form-original-id').value = d.id;
            document.getElementById('form-name').value = d.name;
            document.getElementById('form-url').value = d.url;
            document.getElementById('form-enable').checked = d.enable;
            document.getElementById('btn-delete').style.display = 'inline-block';
            document.getElementById('modal-title').textContent = 'Редактировать устройство';
        }

        async function saveDevice(e) {
            e.preventDefault();
            const mode = document.getElementById('form-mode').value;
            const originalId = document.getElementById('form-original-id').value;
            
            const payload = {
                name: document.getElementById('form-name').value.trim(),
                url: document.getElementById('form-url').value.trim(),
                enable: document.getElementById('form-enable').checked
            };

            const url = mode === 'create' ? `${API}/devices` : `${API}/devices/${originalId}`;
            const method = mode === 'create' ? 'POST' : 'PUT';

            try {
                const resp = await fetch(url, {
                    method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail || 'Ошибка'); }
                closeModal();
                loadDevices();
            } catch (e) { alert('Ошибка: ' + e.message); }
        }

        function promptDelete(id) {
            if (confirm('Удалить это устройство? Оно будет отвязано от всех зон.')) deleteDeviceById(id);
        }

        async function deleteDevice() {
            const id = document.getElementById('form-original-id').value;
            if (confirm('Удалить это устройство?')) {
                closeModal();
                await deleteDeviceById(id);
            }
        }

        async function deleteDeviceById(id) {
            try {
                const resp = await fetch(`${API}/devices/${id}`, { method: 'DELETE' });
                if (!resp.ok) throw new Error('Ошибка удаления');
                loadDevices();
            } catch (e) { alert('Ошибка: ' + e.message); }
        }

        document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        loadDevices();
    </script>
</body>
</html>
